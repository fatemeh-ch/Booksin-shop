{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="fatemeh-code-official">
    <meta name="subject" content="book shop">
    <meta name="keywords" content="book,book shop,bookshop,booksin,sign up">
    <meta name="description" content="Booksin online book shop">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{% static 'styles/basics.css' %}">
    <link rel="stylesheet" href="{% static 'styles/login.css' %}">
    <link rel="icon" href="{% static 'images/favicon.png' %}" type="image/png">
    <title>Sign up</title>
</head>

<body>
    <!-- Sign up container -->
    <div class="login_container d-flex column-flex align-items-center">
        <!-- Logo -->
        <div class="logo d-flex align-items-center">
            <img src="{% static 'images/logo.png' %}" alt="Booksin-logo">
            <h1 class="logo_title">Booksin</h1>
        </div>
        <!-- End of Logo -->

        <!-- Main Title -->
        <h2 class="main_title">Sign up</h2>
        <!-- End of Main Title -->

        <!-- Sign up form -->
        <form action="{% url 'accounts:register' %}" class="login_form d-flex column-flex" method="post">

            {% csrf_token %}

            <label for="username"><i class="fa-regular fa-user form_icons"></i></label>
            <input type="text" id="username" name="username" placeholder="Enter uername..." class="form_inputs">

            <label for="password1"><i class="fa-solid fa-lock form_icons"></i></label>
            <input type="password" name="password1" id="password1" placeholder="Enter password" class="form_inputs">

            <label for="password2"><i class="fa-solid fa-lock form_icons"></i></label>
            <input type="password" name="password2" id="password2" placeholder="Confirm your password"
                class="form_inputs">

            <!-- Error showing -->
            {% for field in form %}
                {% for error in field.errors %}
                    <p style="color:red;">{{ error }}</p>
                {% endfor %}
            {% endfor %}


            <input type="submit" value="Send" class="submit_btn">
        </form>
        <!-- End of Sign up form -->

        <!-- Log in -->
        <a href="{% url 'accounts:login' %}" class="login_msg">Have account?login</a>

    </div>
    <!-- End of Sign up container -->
</body>

</html>
